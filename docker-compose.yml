services:
  university-agent:
    image: ${ACAPY_IMAGE:-ghcr.io/openwallet-foundation/acapy-agent:1.6.0}
    container_name: university-agent
    ports:
      - "8020:8020"
      - "8021:8021"
      - "8022:8022"
    command:
      - start
      - --auto-provision
      - --inbound-transport
      - http
      - "0.0.0.0"
      - "8020"
      - --inbound-transport
      - ws
      - "0.0.0.0"
      - "8022"
      - --outbound-transport
      - http
      - --outbound-transport
      - ws
      - --endpoint
      - ${UNIVERSITY_ENDPOINT:-http://university-agent:8020}
      - ${UNIVERSITY_WS_ENDPOINT:-ws://university-agent:8022}
      - --admin
      - "0.0.0.0"
      - "8021"
      - --admin-insecure-mode
      - --genesis-url
      - ${GENESIS_URL}
      - --wallet-type
      - askar
      - --wallet-name
      - university_wallet
      - --wallet-key
      - ${UNIVERSITY_WALLET_KEY}
      - --seed
      - ${UNIVERSITY_SEED}
      - --label
      - "BRAC University"
      - --webhook-url
      - http://backend:5000/webhooks/university
      - --auto-accept-invites
      - --auto-accept-requests
      - --auto-ping-connection
      - --open-mediation
      - --plugin
      - auto_issue_bridge
      - --log-level
      - info
    user: root
    environment:
      PYTHONPATH: /plugins
    volumes:
      - university-wallet:/home/aries/.acapy_agent/wallet
      - ./acapy-plugins/auto_issue_bridge:/plugins/auto_issue_bridge
      - pending-issuance:/shared/pending
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8021/status/live')"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [ssi-net]

  student-agent:
    image: ${ACAPY_IMAGE:-ghcr.io/openwallet-foundation/acapy-agent:1.6.0}
    container_name: student-agent
    ports:
      - "8030:8030"
      - "8031:8031"
    command:
      - start
      - --auto-provision
      - --inbound-transport
      - http
      - "0.0.0.0"
      - "8030"
      - --outbound-transport
      - http
      - --endpoint
      - http://student-agent:8030
      - --admin
      - "0.0.0.0"
      - "8031"
      - --admin-insecure-mode
      - --genesis-url
      - ${GENESIS_URL}
      - --wallet-type
      - askar
      - --wallet-name
      - student_wallet
      - --wallet-key
      - ${STUDENT_WALLET_KEY}
      - --label
      - "Test Student Wallet"
      - --webhook-url
      - http://backend:5000/webhooks/student
      - --auto-accept-invites
      - --auto-accept-requests
      - --auto-ping-connection
      - --auto-respond-credential-offer
      - --auto-store-credential
      - --auto-respond-presentation-request
      - --log-level
      - info
    user: root
    volumes:
      - student-wallet:/home/aries/.acapy_agent/wallet
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8031/status/live')"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [ssi-net]

  faculty-agent:
    image: ${ACAPY_IMAGE:-ghcr.io/openwallet-foundation/acapy-agent:1.6.0}
    container_name: faculty-agent
    ports:
      - "8040:8040"
      - "8041:8041"
    command:
      - start
      - --auto-provision
      - --inbound-transport
      - http
      - "0.0.0.0"
      - "8040"
      - --outbound-transport
      - http
      - --endpoint
      - http://faculty-agent:8040
      - --admin
      - "0.0.0.0"
      - "8041"
      - --admin-insecure-mode
      - --genesis-url
      - ${GENESIS_URL}
      - --wallet-type
      - askar
      - --wallet-name
      - faculty_wallet
      - --wallet-key
      - ${FACULTY_WALLET_KEY}
      - --label
      - "Test Faculty Wallet"
      - --webhook-url
      - http://backend:5000/webhooks/faculty
      - --auto-accept-invites
      - --auto-accept-requests
      - --auto-ping-connection
      - --log-level
      - info
    user: root
    volumes:
      - faculty-wallet:/home/aries/.acapy_agent/wallet
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8041/status/live')"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [ssi-net]

  transport-proxy:
    build: ./transport-proxy
    container_name: transport-proxy
    ports:
      - "8023:8023"
    environment:
      PORT: 8023
      HTTP_TARGET: http://university-agent:8020
      WS_TARGET: http://university-agent:8022
    depends_on:
      university-agent:
        condition: service_healthy
    networks: [ssi-net]

  backend:
    build: ./backend
    container_name: portal-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      UNIVERSITY_ADMIN_URL: http://university-agent:8021
      STUDENT_ADMIN_URL: http://student-agent:8031
      FACULTY_ADMIN_URL: http://faculty-agent:8041
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    volumes:
      - ./backend/ledger-config.json:/app/ledger-config.json
      - pending-issuance:/shared/pending
    depends_on:
      university-agent:
        condition: service_healthy
      student-agent:
        condition: service_healthy
      faculty-agent:
        condition: service_healthy
    networks: [ssi-net]

networks:
  ssi-net:
    driver: bridge

volumes:
  university-wallet:
  student-wallet:
  faculty-wallet:
  pending-issuance:
